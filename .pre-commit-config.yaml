# .pre-commit-config.yaml
# US Fashion Persona Screener - Security + Development Gate
# 참조: SECURITY_HARNESS.md §6.6
# rev 값은 시작점. uv run pre-commit autoupdate 로 안정 버전 확인 후 woo 승인.

fail_fast: false
# Obsidian vault runtime/plugin files are tracked separately and must not block code/document gates.
exclude: ^\.obsidian/

repos:
  - repo: local
    hooks:
      - id: require-tracked-release-baseline
        name: require tracked baseline for --all-files release gate
        language: system
        entry: git ls-files --error-unmatch pyproject.toml
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
        # Legacy research/reference docs keep source formatting. Normalize in a separate cleanup commit if needed.
        exclude: ^(data/(01-nemotron-persona-summary|02-fashion-targeting-program-feasibility|03-nemotron-personas-overview)\.md|Datasets-nvidia-Nemotron-Personas-USA\.md|pm/reviewer-guide\.md|woo/director-guide\.md|codex-comments/phase-0-lockins-review-260430-002413\.md)$
      - id: trailing-whitespace
        # Legacy research/reference docs keep source formatting. Normalize in a separate cleanup commit if needed.
        exclude: ^(data/(01-nemotron-persona-summary|02-fashion-targeting-program-feasibility|03-nemotron-personas-overview)\.md|Datasets-nvidia-Nemotron-Personas-USA\.md|pm/reviewer-guide\.md|woo/director-guide\.md|codex-comments/phase-0-lockins-review-260430-002413\.md)$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.26.0
    hooks:
      - id: gitleaks-system
        pass_filenames: false
        exclude: ^\.obsidian/
